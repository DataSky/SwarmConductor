<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f96f0" />
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950" />
    </marker>
  </defs>

  <rect width="960" height="700" fill="white" />

  <!-- Title -->
  <text x="480" y="36" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Swarm Conductor - System Architecture</text>

  <!-- ── Layer 0: User ── -->
  <rect x="380" y="58" width="200" height="52" rx="8" fill="#f0f4ff" stroke="#4f96f0" stroke-width="2" />
  <text x="480" y="79" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">User</text>
  <text x="480" y="98" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#555">swarm run --goal / --tasks</text>

  <!-- User -> Conductor -->
  <line x1="480" y1="110" x2="480" y2="148" stroke="#4f96f0" stroke-width="2" marker-end="url(#arr-blue)" />

  <!-- ── Layer 1: Conductor ── -->
  <rect x="60" y="150" width="840" height="150" rx="10" fill="#f8f9ff" stroke="#4f96f0" stroke-width="2" stroke-dasharray="6,3" />
  <text x="90" y="172" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4f96f0">Conductor Layer</text>

  <!-- Conductor sub-boxes -->
  <rect x="80" y="182" width="150" height="96" rx="6" fill="#e3f2ff" stroke="#4f96f0" stroke-width="1.5" />
  <text x="155" y="202" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Conductor</text>
  <text x="155" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">Scheduler tick()</text>
  <text x="155" y="236" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">dispatch() loop</text>
  <text x="155" y="252" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">deadlock detection</text>
  <text x="155" y="268" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">dynamic task insert</text>

  <rect x="250" y="182" width="140" height="96" rx="6" fill="#e3f2ff" stroke="#4f96f0" stroke-width="1.5" />
  <text x="320" y="202" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">TaskDAG</text>
  <text x="320" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">dependency graph</text>
  <text x="320" y="236" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">status machine</text>
  <text x="320" y="252" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">priority queue</text>

  <rect x="408" y="182" width="140" height="96" rx="6" fill="#e3f2ff" stroke="#4f96f0" stroke-width="1.5" />
  <text x="478" y="202" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">FileLockRegistry</text>
  <text x="478" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">scope conflict check</text>
  <text x="478" y="236" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">TTL auto-release</text>
  <text x="478" y="252" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">tryAcquire()</text>

  <rect x="566" y="182" width="140" height="96" rx="6" fill="#f0e6ff" stroke="#9c51f0" stroke-width="1.5" />
  <text x="636" y="202" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">ApprovalGate</text>
  <text x="636" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">human-in-the-loop</text>
  <text x="636" y="236" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">phase boundary</text>
  <text x="636" y="252" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">high-risk gate</text>

  <rect x="724" y="182" width="150" height="96" rx="6" fill="#fff0e6" stroke="#f0a030" stroke-width="1.5" />
  <text x="799" y="202" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">CrashRecovery</text>
  <text x="799" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">heartbeat monitor</text>
  <text x="799" y="236" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">auto restart</text>
  <text x="799" y="252" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">requeue tasks</text>

  <!-- ── Arrows Conductor -> Runtime / Memory / Workspace ── -->
  <line x1="200" y1="300" x2="200" y2="348" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="480" y1="300" x2="480" y2="408" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="760" y1="300" x2="760" y2="488" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- ── Layer 2: Runtime ── -->
  <rect x="60" y="350" width="380" height="130" rx="10" fill="#f0fff4" stroke="#3fb950" stroke-width="2" stroke-dasharray="6,3" />
  <text x="90" y="372" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3fb950">Agent Runtime Layer</text>

  <rect x="80" y="382" width="155" height="80" rx="6" fill="#d4f5e2" stroke="#3fb950" stroke-width="1.5" />
  <text x="157" y="402" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">AgentProcessMgr</text>
  <text x="157" y="420" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">spawn codewhale</text>
  <text x="157" y="436" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">port pool :7878+</text>
  <text x="157" y="452" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">idle / busy state</text>

  <rect x="253" y="382" width="165" height="80" rx="6" fill="#d4f5e2" stroke="#3fb950" stroke-width="1.5" />
  <text x="335" y="402" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">CodeWhaleClient</text>
  <text x="335" y="420" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">HTTP REST</text>
  <text x="335" y="436" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">SSE event stream</text>
  <text x="335" y="452" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">waitForTurn()</text>

  <!-- ── Layer 3: Memory ── -->
  <rect x="460" y="410" width="300" height="130" rx="10" fill="#fef9f0" stroke="#f0a030" stroke-width="2" stroke-dasharray="6,3" />
  <text x="490" y="432" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0a030">Persistence Layer</text>

  <rect x="478" y="442" width="120" height="80" rx="6" fill="#fde8c0" stroke="#f0a030" stroke-width="1.5" />
  <text x="538" y="462" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">ConductorStore</text>
  <text x="538" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">SQLite WAL</text>
  <text x="538" y="496" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">runs / tasks</text>
  <text x="538" y="512" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">memory / events</text>

  <rect x="616" y="442" width="120" height="80" rx="6" fill="#fde8c0" stroke="#f0a030" stroke-width="1.5" />
  <text x="676" y="462" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">SharedMemory</text>
  <text x="676" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">project_map</text>
  <text x="676" y="496" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">context</text>
  <text x="676" y="512" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">event_log</text>

  <!-- ── Layer 4: Workspace ── -->
  <rect x="680" y="490" width="240" height="130" rx="10" fill="#fff0f5" stroke="#f04f85" stroke-width="2" stroke-dasharray="6,3" />
  <text x="710" y="512" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f04f85">Workspace Layer</text>

  <rect x="698" y="524" width="100" height="76" rx="6" fill="#ffd4e5" stroke="#f04f85" stroke-width="1.5" />
  <text x="748" y="544" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">FileLock</text>
  <text x="748" y="562" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">logic lock</text>
  <text x="748" y="578" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">TTL eviction</text>
  <text x="748" y="594" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">per-file</text>

  <rect x="810" y="524" width="100" height="76" rx="6" fill="#ffd4e5" stroke="#f04f85" stroke-width="1.5" />
  <text x="860" y="544" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">GitManager</text>
  <text x="860" y="562" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">branch per agent</text>
  <text x="860" y="578" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">tryMerge()</text>
  <text x="860" y="594" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">conflict detect</text>

  <!-- ── CodeWhale Agents ── -->
  <rect x="60" y="530" width="380" height="100" rx="10" fill="#f5f5ff" stroke="#8080c0" stroke-width="2" stroke-dasharray="6,3" />
  <text x="90" y="552" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8080c0">CodeWhale Agent Pool (max 20)</text>

  <rect x="78" y="562" width="70" height="52" rx="5" fill="#e0e0ff" stroke="#8080c0" stroke-width="1.5" />
  <text x="113" y="582" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Agent 01</text>
  <text x="113" y="598" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">:7878</text>

  <rect x="158" y="562" width="70" height="52" rx="5" fill="#e0e0ff" stroke="#8080c0" stroke-width="1.5" />
  <text x="193" y="582" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Agent 02</text>
  <text x="193" y="598" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">:7879</text>

  <rect x="238" y="562" width="70" height="52" rx="5" fill="#e0e0ff" stroke="#8080c0" stroke-width="1.5" />
  <text x="273" y="582" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Agent 03</text>
  <text x="273" y="598" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">:7880</text>

  <text x="355" y="590" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#8080c0">...</text>

  <!-- Runtime -> Agents -->
  <line x1="250" y1="480" x2="250" y2="528" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)" />

  <!-- Legend -->
  <rect x="62" y="648" width="14" height="14" rx="2" fill="#e3f2ff" stroke="#4f96f0" stroke-width="1.5" />
  <text x="82" y="660" font-family="Arial, sans-serif" font-size="11" fill="#555">Conductor</text>
  <rect x="162" y="648" width="14" height="14" rx="2" fill="#d4f5e2" stroke="#3fb950" stroke-width="1.5" />
  <text x="182" y="660" font-family="Arial, sans-serif" font-size="11" fill="#555">Runtime</text>
  <rect x="252" y="648" width="14" height="14" rx="2" fill="#fde8c0" stroke="#f0a030" stroke-width="1.5" />
  <text x="272" y="660" font-family="Arial, sans-serif" font-size="11" fill="#555">Persistence</text>
  <rect x="362" y="648" width="14" height="14" rx="2" fill="#ffd4e5" stroke="#f04f85" stroke-width="1.5" />
  <text x="382" y="660" font-family="Arial, sans-serif" font-size="11" fill="#555">Workspace</text>
  <rect x="462" y="648" width="14" height="14" rx="2" fill="#e0e0ff" stroke="#8080c0" stroke-width="1.5" />
  <text x="482" y="660" font-family="Arial, sans-serif" font-size="11" fill="#555">CodeWhale Agents</text>
</svg>
