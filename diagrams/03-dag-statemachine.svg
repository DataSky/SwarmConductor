<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950" />
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f04f4f" />
    </marker>
    <marker id="arr-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4a000" />
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
  </defs>

  <rect width="960" height="720" fill="white" />

  <!-- ══════════════════════════════════════════════════════════
       LEFT HALF: Task State Machine
       ══════════════════════════════════════════════════════════ -->
  <text x="240" y="36" font-family="Arial, sans-serif" font-size="19" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Task State Machine</text>

  <!-- pending -->
  <rect x="160" y="58" width="160" height="52" rx="26" fill="#e8e8e8" stroke="#888" stroke-width="2" />
  <text x="240" y="88" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#444">pending</text>

  <!-- pending -> blocked -->
  <line x1="200" y1="110" x2="160" y2="158" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)" />
  <text x="148" y="142" font-family="Arial, sans-serif" font-size="10" fill="#999">has deps</text>

  <!-- pending -> ready -->
  <line x1="280" y1="110" x2="320" y2="158" stroke="#333" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="310" y="142" font-family="Arial, sans-serif" font-size="10" fill="#555">no deps</text>

  <!-- blocked -->
  <rect x="60" y="160" width="160" height="52" rx="26" fill="#f0f0f0" stroke="#aaa" stroke-width="2" />
  <text x="140" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#888">blocked</text>

  <!-- blocked -> ready (deps done) -->
  <line x1="220" y1="186" x2="300" y2="186" stroke="#4f96f0" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="258" y="178" font-family="Arial, sans-serif" font-size="10" fill="#4f96f0">deps done</text>

  <!-- ready -->
  <rect x="300" y="160" width="160" height="52" rx="26" fill="#d4ecff" stroke="#4f96f0" stroke-width="2" />
  <text x="380" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a4a80">ready</text>

  <!-- ready -> running -->
  <line x1="380" y1="212" x2="380" y2="258" stroke="#333" stroke-width="2" marker-end="url(#arr)" />
  <text x="392" y="238" font-family="Arial, sans-serif" font-size="10" fill="#555">agent assigned</text>

  <!-- running -->
  <rect x="300" y="260" width="160" height="52" rx="26" fill="#d4edff" stroke="#1a90ff" stroke-width="2.5" />
  <text x="380" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#004080">running</text>

  <!-- running -> done -->
  <line x1="460" y1="286" x2="510" y2="286" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)" />
  <text x="480" y="278" font-family="Arial, sans-serif" font-size="10" fill="#3fb950">success</text>

  <!-- done -->
  <rect x="510" y="260" width="160" height="52" rx="26" fill="#d4f5e2" stroke="#3fb950" stroke-width="2.5" />
  <text x="590" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a6633">done</text>

  <!-- running -> failed -->
  <line x1="380" y1="312" x2="240" y2="358" stroke="#f04f4f" stroke-width="1.5" marker-end="url(#arr-red)" />
  <text x="285" y="342" font-family="Arial, sans-serif" font-size="10" fill="#f04f4f">error</text>

  <!-- failed -->
  <rect x="140" y="360" width="160" height="52" rx="26" fill="#ffe0e0" stroke="#f04f4f" stroke-width="2" />
  <text x="220" y="390" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#a00000">failed</text>

  <!-- failed -> ready (retry) -->
  <line x1="300" y1="386" x2="380" y2="320" stroke="#f0a030" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-yellow)" />
  <text x="366" y="342" font-family="Arial, sans-serif" font-size="10" fill="#f0a030">retry (max 2)</text>

  <!-- failed (exhausted) annotation -->
  <text x="130" y="430" font-family="Arial, sans-serif" font-size="10" fill="#999">retryCount >= maxRetries</text>
  <text x="130" y="444" font-family="Arial, sans-serif" font-size="10" fill="#999">stays failed (terminal)</text>

  <!-- running -> interrupted (deadlock) -->
  <line x1="300" y1="270" x2="140" y2="270" stroke="#d4a000" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-yellow)" />
  <text x="195" y="264" font-family="Arial, sans-serif" font-size="10" fill="#d4a000">deadlock</text>

  <!-- interrupted -->
  <rect x="20" y="248" width="120" height="44" rx="22" fill="#fff8e0" stroke="#d4a000" stroke-width="2" />
  <text x="80" y="274" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#806000">interrupted</text>

  <!-- State Machine notes -->
  <rect x="20" y="480" width="430" height="104" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1" />
  <text x="36" y="500" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">State transition rules</text>
  <text x="36" y="520" font-family="Arial, sans-serif" font-size="11" fill="#555">pending -> ready    : no dependsOn, or all deps done</text>
  <text x="36" y="536" font-family="Arial, sans-serif" font-size="11" fill="#555">pending -> blocked  : at least one dep not done</text>
  <text x="36" y="552" font-family="Arial, sans-serif" font-size="11" fill="#555">blocked -> ready    : last blocking dep transitions to done</text>
  <text x="36" y="568" font-family="Arial, sans-serif" font-size="11" fill="#555">running -> failed   : agent error; retryCount++ then back to ready</text>
  <text x="36" y="584" font-family="Arial, sans-serif" font-size="11" fill="#555">running -> interrupted : deadlock detected by conductor</text>

  <!-- ══════════════════════════════════════════════════════════
       RIGHT HALF: DAG Example
       ══════════════════════════════════════════════════════════ -->
  <line x1="500" y1="50" x2="500" y2="700" stroke="#eee" stroke-width="1" />

  <text x="730" y="36" font-family="Arial, sans-serif" font-size="19" font-weight="bold" text-anchor="middle" fill="#1a1a2e">DAG Example: swarm run --goal</text>

  <!-- Phase 0 label -->
  <text x="730" y="68" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#4f96f0">Phase 0 - Parallel Explore</text>

  <!-- Explore 1 -->
  <rect x="530" y="76" width="150" height="52" rx="6" fill="#d4ecff" stroke="#4f96f0" stroke-width="2" />
  <text x="605" y="98" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a4a80">Explore</text>
  <text x="605" y="116" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">scan codebase</text>

  <!-- Explore 2 -->
  <rect x="700" y="76" width="150" height="52" rx="6" fill="#d4ecff" stroke="#4f96f0" stroke-width="2" />
  <text x="775" y="98" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a4a80">Explore</text>
  <text x="775" y="116" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">map APIs</text>

  <!-- Explore 3 -->
  <rect x="870" y="76" width="60" height="52" rx="6" fill="#d4ecff" stroke="#4f96f0" stroke-width="1.5" />
  <text x="900" y="104" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a4a80">...</text>

  <!-- Phase 1 label -->
  <text x="730" y="180" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#9c51f0">Phase 1 - Plan (sequential)</text>

  <!-- Plan -->
  <rect x="630" y="190" width="200" height="52" rx="6" fill="#f0e6ff" stroke="#9c51f0" stroke-width="2" />
  <text x="730" y="212" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#4a0080">Plan</text>
  <text x="730" y="230" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">design solution</text>

  <!-- Explore -> Plan arrows (fan-in) -->
  <line x1="605" y1="128" x2="690" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="775" y1="128" x2="750" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="884" y1="128" x2="830" y2="188" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)" />

  <!-- Phase 2 label -->
  <text x="730" y="300" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#f0a030">Phase 2 - Parallel Implement + Review</text>

  <!-- Implement -->
  <rect x="560" y="310" width="160" height="52" rx="6" fill="#fde8c0" stroke="#f0a030" stroke-width="2" />
  <text x="640" y="332" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#7a3c00">Implement</text>
  <text x="640" y="350" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">write code</text>

  <!-- Review -->
  <rect x="740" y="310" width="160" height="52" rx="6" fill="#fde8c0" stroke="#f0a030" stroke-width="2" />
  <text x="820" y="332" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#7a3c00">Review</text>
  <text x="820" y="350" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">check quality</text>

  <!-- Plan -> Implement, Plan -> Review (fan-out) -->
  <line x1="700" y1="242" x2="660" y2="308" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="760" y1="242" x2="800" y2="308" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- Phase 3 label -->
  <text x="730" y="420" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#3fb950">Phase 3 - Verify</text>

  <!-- Verify -->
  <rect x="630" y="430" width="200" height="52" rx="6" fill="#d4f5e2" stroke="#3fb950" stroke-width="2" />
  <text x="730" y="452" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a6633">Verify</text>
  <text x="730" y="470" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">run tests + confirm</text>

  <!-- Implement -> Verify, Review -> Verify (fan-in) -->
  <line x1="660" y1="362" x2="700" y2="428" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="800" y1="362" x2="760" y2="428" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- Dynamic tasks label -->
  <rect x="870" y="310" width="64" height="52" rx="6" fill="#fff0f5" stroke="#f04f85" stroke-width="1.5" stroke-dasharray="5,3" />
  <text x="902" y="332" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#f04f85">Dynamic</text>
  <text x="902" y="348" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#f04f85">task +</text>

  <!-- Implement -> Dynamic (inserted) -->
  <line x1="720" y1="336" x2="868" y2="336" stroke="#f04f85" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)" />
  <text x="790" y="330" font-family="Arial, sans-serif" font-size="9" fill="#f04f85">BLOCKERS inject</text>

  <!-- Legend right -->
  <rect x="520" y="530" width="400" height="150" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1" />
  <text x="536" y="550" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">DAG concurrency rules</text>
  <text x="536" y="570" font-family="Arial, sans-serif" font-size="11" fill="#555">Tasks with no deps: all start in parallel (Phase 0)</text>
  <text x="536" y="586" font-family="Arial, sans-serif" font-size="11" fill="#555">Fan-in: task waits until ALL its deps are done</text>
  <text x="536" y="602" font-family="Arial, sans-serif" font-size="11" fill="#555">Fan-out: done task unblocks ALL downstream tasks</text>
  <text x="536" y="618" font-family="Arial, sans-serif" font-size="11" fill="#555">Same scope: two tasks never run concurrently</text>
  <text x="536" y="634" font-family="Arial, sans-serif" font-size="11" fill="#555">Dynamic insert: agent BLOCKERS auto-create new tasks</text>
  <text x="536" y="650" font-family="Arial, sans-serif" font-size="11" fill="#555">Dedup: same-title tasks are never inserted twice</text>
  <text x="536" y="666" font-family="Arial, sans-serif" font-size="11" fill="#f04f85">High RISKS: scheduler pauses, waits for approval</text>
</svg>
