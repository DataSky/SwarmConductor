<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Swarm Conductor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --bg2:       #161b22;
  --bg3:       #21262d;
  --border:    #30363d;
  --text:      #e6edf3;
  --dim:       #7d8590;
  --green:     #3fb950;
  --yellow:    #d29922;
  --red:       #f85149;
  --cyan:      #58a6ff;
  --purple:    #bc8cff;
  --orange:    #ffa657;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ──────────────────────────────────────────────────────────────── */

#header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}

#header-row1 {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

#header-row2 {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--dim);
  font-size: 12px;
  flex-wrap: wrap;
}

.brand { color: var(--cyan); font-weight: bold; font-size: 14px; letter-spacing: 1px; }
.run-id { color: var(--dim); font-size: 11px; }

.progress-bar {
  display: flex;
  align-items: center;
  gap: 6px;
}
#prog-bar {
  width: 120px;
  height: 8px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
}
#prog-fill {
  height: 100%;
  background: var(--green);
  border-radius: 4px;
  transition: width 0.4s ease;
}

.badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: bold;
}
.badge-risk   { background: rgba(248,81,73,0.2);  color: var(--red);    border: 1px solid rgba(248,81,73,0.4); }
.badge-phase  { background: rgba(88,166,255,0.1); color: var(--cyan);   border: 1px solid rgba(88,166,255,0.3); }
.badge-eta    { background: rgba(210,153,34,0.1); color: var(--yellow); border: 1px solid rgba(210,153,34,0.3); }
.badge-cost   { background: rgba(63,185,80,0.1);  color: var(--green);  border: 1px solid rgba(63,185,80,0.3); }

#conn-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
.dot-live     { background: var(--green); }
.dot-reconnect{ background: var(--yellow); animation: blink 0.6s infinite; }
.dot-replay   { background: var(--dim); animation: none; }
@keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }

.btn {
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: #2d333b; }
.btn-pause  { color: var(--yellow); border-color: var(--yellow); }
.btn-pause.active { background: rgba(210,153,34,0.15); }
.btn-resume { color: var(--green);  border-color: var(--green); }
.btn-danger { color: var(--red);    border-color: var(--red); }

#phase-timeline {
  display: flex;
  gap: 6px;
  align-items: center;
}
.phase-chip {
  padding: 1px 8px;
  border-radius: 12px;
  font-size: 11px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--dim);
}
.phase-chip.active {
  background: rgba(88,166,255,0.1);
  border-color: var(--cyan);
  color: var(--cyan);
}

#stats-row {
  display: flex;
  gap: 16px;
  align-items: center;
}
.stat { color: var(--dim); }
.stat span { color: var(--text); }

/* ── Main layout ─────────────────────────────────────────────────────────── */

#main {
  display: grid;
  grid-template-columns: 260px 1fr 300px;
  grid-template-rows: 1fr auto;
  flex: 1;
  overflow: hidden;
  gap: 0;
}

.pane {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.pane:last-of-type { border-right: none; }

.pane-header {
  padding: 6px 12px;
  font-size: 11px;
  font-weight: bold;
  color: var(--dim);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.pane-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

/* ── Task DAG pane ───────────────────────────────────────────────────────── */

.phase-group { margin-bottom: 4px; }
.phase-label {
  padding: 4px 12px 2px;
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.phase-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.task-row {
  padding: 5px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.1s;
}
.task-row:hover      { background: var(--bg3); }
.task-row.selected   { background: rgba(88,166,255,0.08); border-left-color: var(--cyan); }
.task-row.running    { border-left-color: var(--cyan); }
.task-row.done       { opacity: 0.7; }
.task-row.failed     { border-left-color: var(--red); }

.task-icon { width: 14px; text-align: center; flex-shrink: 0; }
.task-type-tag {
  font-size: 10px;
  color: var(--dim);
  background: var(--bg3);
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}
.task-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
}
.task-elapsed {
  font-size: 10px;
  color: var(--dim);
  flex-shrink: 0;
}
.task-dynamic { color: var(--purple); font-size: 10px; flex-shrink: 0; }

#add-task-btn {
  margin: 8px 12px;
  width: calc(100% - 24px);
  text-align: center;
  color: var(--dim);
  border: 1px dashed var(--border);
  border-radius: 4px;
  padding: 5px;
  cursor: pointer;
  font-size: 12px;
  transition: border-color 0.15s, color 0.15s;
}
#add-task-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* ── Agent pane ──────────────────────────────────────────────────────────── */

.agent-card {
  margin: 6px 10px;
  padding: 10px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.agent-card:hover        { border-color: var(--cyan); }
.agent-card.expanded     { border-color: var(--cyan); }

.agent-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
}
.agent-dot { color: var(--cyan); font-size: 12px; }
.agent-type-tag {
  font-size: 10px;
  color: var(--dim);
  background: var(--bg);
  padding: 1px 5px;
  border-radius: 3px;
}
.agent-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
.agent-model {
  font-size: 11px;
  color: var(--yellow);
  background: rgba(210,153,34,0.1);
  padding: 1px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}
.agent-elapsed { font-size: 11px; color: var(--dim); flex-shrink: 0; }

.agent-meta {
  margin-top: 5px;
  font-size: 11px;
  color: var(--dim);
  display: flex;
  gap: 8px;
  align-items: center;
}
.agent-scope {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.agent-lastline {
  margin-top: 5px;
  font-size: 11px;
  color: var(--dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.agent-lastline::before { content: '╰ '; }

.agent-stream {
  margin-top: 8px;
  padding: 6px 8px;
  background: var(--bg);
  border-radius: 4px;
  font-size: 11px;
  color: var(--dim);
  max-height: 160px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  display: none;
}
.agent-card.expanded .agent-stream { display: block; }

.agent-tok {
  margin-top: 5px;
  font-size: 10px;
  color: var(--dim);
  display: flex;
  gap: 8px;
}

.agent-interrupt-btn {
  margin-top: 8px;
  display: none;
}
.agent-card.expanded .agent-interrupt-btn { display: block; }

.idle-agents {
  padding: 8px 12px;
  color: var(--dim);
  font-size: 12px;
}

/* ── Log pane ────────────────────────────────────────────────────────────── */

#log-body {
  padding: 6px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.log-line {
  font-size: 11px;
  color: var(--dim);
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.5;
}
.log-line.done    { color: var(--green); }
.log-line.fail    { color: var(--red); }
.log-line.running { color: var(--cyan); }
.log-line.dynamic { color: var(--purple); }
.log-line.paused  { color: var(--yellow); }

/* ── Detail panel ────────────────────────────────────────────────────────── */

#detail-panel {
  grid-column: 1 / -1;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.25s ease;
}
#detail-panel.open { max-height: 280px; overflow-y: auto; }

#detail-inner {
  padding: 12px 16px;
}
.detail-meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 10px;
  font-size: 12px;
}
.detail-meta span { color: var(--dim); }
.detail-meta strong { color: var(--text); }

.detail-sections {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.detail-section h4 {
  font-size: 11px;
  color: var(--cyan);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.detail-section pre {
  font-size: 11px;
  color: var(--dim);
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--bg3);
  padding: 6px 8px;
  border-radius: 4px;
  max-height: 120px;
  overflow-y: auto;
}

/* ── Approval modal ──────────────────────────────────────────────────────── */

#approval-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#approval-overlay.open { display: flex; }
#approval-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  max-width: 480px;
  width: 90%;
}
#approval-box h3 { color: var(--yellow); margin-bottom: 12px; font-size: 14px; }
#approval-msg { color: var(--dim); font-size: 12px; margin-bottom: 16px; white-space: pre-wrap; }
.approval-btns { display: flex; gap: 10px; }

/* ── Inject modal ────────────────────────────────────────────────────────── */

#inject-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#inject-overlay.open { display: flex; }
#inject-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  max-width: 520px;
  width: 90%;
}
#inject-box h3 { color: var(--cyan); margin-bottom: 12px; font-size: 14px; }
#inject-prompt {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px;
  resize: vertical;
  min-height: 80px;
  margin-bottom: 12px;
}
#inject-prompt:focus { outline: none; border-color: var(--cyan); }
.inject-btns { display: flex; gap: 10px; justify-content: flex-end; }

/* ── Scrollbar ───────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  #main { grid-template-columns: 1fr 1fr; }
  #log-pane { display: none; }
}
@media (max-width: 600px) {
  #main { grid-template-columns: 1fr; }
  #agent-pane { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="header-row1">
    <span class="brand">SWARM</span>
    <span class="run-id" id="run-id">—</span>
    <span class="badge badge-phase" id="phase-badge">Phase 0</span>
    <div class="progress-bar">
      <div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
      <span id="prog-text" style="font-size:12px;color:var(--dim)">0/0</span>
    </div>
    <span class="badge badge-risk" id="risk-badge" style="display:none">⚠ 0 risk</span>
    <span class="badge badge-eta"  id="eta-badge"  style="display:none">ETA —</span>
    <span class="badge badge-cost" id="cost-badge" style="display:none">$0.00</span>
    <button class="btn btn-pause"  id="pause-btn"  onclick="togglePause()">⏸ Pause</button>
    <div id="conn-status">
      <div class="dot dot-live" id="conn-dot"></div>
      <span id="conn-label">LIVE</span>
    </div>
  </div>
  <div id="header-row2">
    <div id="stats-row">
      <span class="stat">agents <span id="stat-agents">—</span></span>
      <span class="stat">tasks <span id="stat-tasks">—</span></span>
      <span class="stat">tok <span id="stat-tok">—</span></span>
      <span class="stat">tok/min <span id="stat-tokrate">—</span></span>
      <span class="stat">cache <span id="stat-cache">—</span></span>
    </div>
    <div id="phase-timeline"></div>
  </div>
</div>

<!-- Main three-pane layout -->
<div id="main">

  <!-- Left: Task DAG -->
  <div class="pane" id="dag-pane">
    <div class="pane-header">
      Tasks
      <span id="dag-count" style="color:var(--dim);font-weight:normal;font-size:11px"></span>
    </div>
    <div class="pane-body" id="dag-body"></div>
    <div id="add-task-btn" onclick="openInjectModal()">+ Add Task</div>
  </div>

  <!-- Mid: Agents -->
  <div class="pane" id="agent-pane">
    <div class="pane-header">
      Agents
      <span id="agent-count" style="color:var(--dim);font-weight:normal;font-size:11px"></span>
    </div>
    <div class="pane-body" id="agent-body"></div>
  </div>

  <!-- Right: Log -->
  <div class="pane" id="log-pane">
    <div class="pane-header">
      Log
      <button class="btn" style="font-size:10px;padding:1px 6px" onclick="clearLog()">Clear</button>
    </div>
    <div class="pane-body" id="log-body"></div>
  </div>

  <!-- Detail panel (spans full width, hidden by default) -->
  <div id="detail-panel">
    <div id="detail-inner"></div>
  </div>
</div>

<!-- Approval modal -->
<div id="approval-overlay">
  <div id="approval-box">
    <h3>⏸ Approval Required</h3>
    <pre id="approval-msg"></pre>
    <div class="approval-btns">
      <button class="btn btn-resume" onclick="resolveApproval('approved')">✓ Approve</button>
      <button class="btn btn-danger" onclick="resolveApproval('rejected')">✗ Reject</button>
    </div>
  </div>
</div>

<!-- Inject task modal -->
<div id="inject-overlay">
  <div id="inject-box">
    <h3>⊕ Inject Task</h3>
    <textarea id="inject-prompt" placeholder="Describe what you want the agent to do..."></textarea>
    <div class="inject-btns">
      <button class="btn" onclick="closeInjectModal()">Cancel</button>
      <button class="btn btn-resume" onclick="submitInject()">Inject</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────

const state = {
  tasks:        [],      // TaskNode[]
  agents:       [],      // AgentSlotInfo[]
  status:       null,
  tokenStats:   null,
  phaseHistory: [],
  pendingApprovals: [],
  log:          [],
  paused:       false,
  riskCount:    0,
  lastRisk:     '',
  runStartMs:   Date.now(),
  selectedTaskId: null,
  expandedAgentId: null,
  agentStreams:  {},     // agentId → full text accumulated
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

let ws = null
let reconnectTimer = null
let reconnectDelay = 1000

function connect() {
  setConnStatus('reconnect')
  ws = new WebSocket(`ws://${location.host}/ws`)

  ws.onopen = () => {
    setConnStatus('live')
    reconnectDelay = 1000
  }

  ws.onclose = () => {
    setConnStatus('reconnect')
    reconnectTimer = setTimeout(connect, reconnectDelay)
    reconnectDelay = Math.min(reconnectDelay * 2, 10000)
  }

  ws.onerror = () => ws.close()

  ws.onmessage = e => {
    const msg = JSON.parse(e.data)
    handleMessage(msg)
  }
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj))
}

function setConnStatus(s) {
  const dot   = document.getElementById('conn-dot')
  const label = document.getElementById('conn-label')
  dot.className   = `dot dot-${s === 'live' ? 'live' : s === 'reconnect' ? 'reconnect' : 'replay'}`
  label.textContent = s === 'live' ? 'LIVE' : s === 'reconnect' ? 'RECONNECTING…' : 'REPLAY'
}

// ── Message handler ───────────────────────────────────────────────────────────

function handleMessage(msg) {
  switch (msg.type) {
    case 'snapshot':
      state.runStartMs = Date.now()
      applySnapshot(msg)
      renderAll()
      break

    case 'tick':
      state.status     = msg.status
      state.tokenStats = msg.tokenStats
      state.tasks      = msg.tasks
      state.agents     = msg.agents
      state.phaseHistory = msg.phaseHistory
      renderHeader()
      renderDag()
      renderAgents()
      break

    case 'event':
      handleEvent(msg.kind, msg.payload)
      break

    case 'delta':
      handleDelta(msg)
      break

    case 'log':
      pushLog(msg.line)
      break
  }
}

function applySnapshot(snap) {
  state.tasks           = snap.tasks      ?? []
  state.agents          = snap.agents     ?? []
  state.status          = snap.status
  state.tokenStats      = snap.tokenStats
  state.phaseHistory    = snap.phaseHistory ?? []
  state.pendingApprovals= snap.pendingApprovals ?? []
  state.log             = snap.log        ?? []
  document.getElementById('run-id').textContent = (snap.runId ?? '—').slice(0, 24)
}

function handleEvent(kind, payload) {
  if (kind === 'task.status_changed') {
    const t = state.tasks.find(t => t.id === payload.taskId)
    if (t) { t.status = payload.next; renderDag(); renderAgents() }
  }
  if (kind === 'task.dynamic_inserted') {
    // Will be reconciled on next tick
  }
  if (kind === 'approval.required') {
    state.pendingApprovals.push({ id: Math.random().toString(36).slice(2), ...payload })
    showApprovalModal()
  }
  if (kind === 'run.completed' || kind === 'run.failed') {
    setConnStatus('replay')
    state.paused = false
    updatePauseBtn()
  }
  if (kind === 'phase.started') {
    renderHeader()
  }
  if (kind === 'agent.crashed') {
    pushLogStyled(`✗ Agent crashed: ${payload.agentId}`, 'fail')
  }
}

function handleDelta(msg) {
  const { agentId, text } = msg
  if (!state.agentStreams[agentId]) state.agentStreams[agentId] = ''
  state.agentStreams[agentId] += text

  // Update lastLine in agent slot
  const slot = state.agents.find(a => a.agentId === agentId)
  if (slot) {
    const lines = state.agentStreams[agentId].split('\n')
    const last  = lines.slice(0, -1).map(l => l.trim()).filter(Boolean).at(-1)
    if (last) slot.lastLine = last.slice(0, 120)
    if (msg.model && !slot.model) slot.model = msg.model
  }

  // Update expanded stream view
  if (state.expandedAgentId === agentId) {
    const el = document.querySelector(`[data-agent-id="${agentId}"] .agent-stream`)
    if (el) {
      el.textContent = state.agentStreams[agentId].slice(-4096)
      el.scrollTop = el.scrollHeight
    }
  }

  // Lazy update agent lastLine display (not full re-render)
  const lastEl = document.querySelector(`[data-agent-id="${agentId}"] .agent-lastline`)
  if (lastEl && slot) lastEl.textContent = slot.lastLine
}

// ── Render: Header ────────────────────────────────────────────────────────────

function renderHeader() {
  const s  = state.status
  const tk = state.tokenStats
  if (!s) return

  const done  = s.tasks?.done    ?? 0
  const total = s.tasks?.total   ?? 0
  const pct   = total > 0 ? Math.round(done / total * 100) : 0

  document.getElementById('prog-fill').style.width = pct + '%'
  document.getElementById('prog-text').textContent = `${done}/${total} (${pct}%)`
  document.getElementById('phase-badge').textContent = `Phase ${s.phase}`

  // Stats
  const ag = s.agents ?? {}
  document.getElementById('stat-agents').textContent =
    `idle:${ag.idle ?? 0} busy:${ag.busy ?? 0}`
  const tk2 = s.tasks ?? {}
  document.getElementById('stat-tasks').textContent =
    `run:${tk2.running ?? 0} rdy:${tk2.ready ?? 0} blk:${tk2.blocked ?? 0} fail:${tk2.failed ?? 0}`

  if (tk && tk.totalTokens > 0) {
    document.getElementById('stat-tok').textContent    = fmtNum(tk.totalTokens)
    document.getElementById('stat-cache').textContent  = tk.cacheHitRate + '%'

    const wallMs  = Date.now() - state.runStartMs
    const tokRate = wallMs > 5000 ? Math.round(tk.totalTokens / wallMs * 60000) : 0
    if (tokRate > 0) document.getElementById('stat-tokrate').textContent = fmtNum(tokRate)

    // Cost estimate (claude-opus-4-7 pricing approximation)
    const cost = (tk.inputTokens * 15 + tk.outputTokens * 75) / 1_000_000
    if (cost > 0) {
      const cb = document.getElementById('cost-badge')
      cb.style.display = ''
      cb.textContent = cost >= 0.01 ? `$${cost.toFixed(2)}` : '<$0.01'
    }
  }

  // ETA
  const doneTasks = state.tasks.filter(t => t.status === 'done' && t.startedAt && t.completedAt)
  if (doneTasks.length > 0) {
    const avgMs = doneTasks.reduce((a, t) => a + (t.completedAt - t.startedAt), 0) / doneTasks.length
    const remaining = total - done - (s.tasks?.failed ?? 0)
    const parallel  = Math.max(1, ag.busy ?? 1)
    const etaMs     = remaining > 0 ? (remaining / parallel) * avgMs : 0
    if (etaMs > 0) {
      const eb = document.getElementById('eta-badge')
      eb.style.display = ''
      eb.textContent = 'ETA ' + fmtEta(etaMs)
    }
  }

  // Risk badge
  if (state.riskCount > 0) {
    const rb = document.getElementById('risk-badge')
    rb.style.display = ''
    rb.textContent = `⚠ ${state.riskCount} risk`
    rb.title = state.lastRisk
  }

  // Phase timeline
  const phases = state.phaseHistory.length > 0
    ? state.phaseHistory
    : [{ phase: 0, startMs: state.runStartMs, endMs: null }]
  const tl = document.getElementById('phase-timeline')
  tl.innerHTML = ''
  for (const p of phases) {
    const dur = p.endMs ? fmtElapsed(p.endMs - p.startMs) : fmtElapsed(Date.now() - p.startMs)
    const chip = document.createElement('span')
    chip.className = 'phase-chip' + (p.endMs === null ? ' active' : '')
    chip.textContent = (p.endMs === null ? '►' : '') + `P${p.phase} ${dur}`
    tl.appendChild(chip)
  }
}

// ── Render: DAG ───────────────────────────────────────────────────────────────

const STATUS_ICON = {
  done: '✓', running: '⟳', ready: '○', blocked: '·',
  failed: '✗', interrupted: '!', pending: '·',
}
const STATUS_COLOR = {
  done: 'var(--green)', running: 'var(--cyan)', ready: 'var(--cyan)',
  blocked: 'var(--dim)', failed: 'var(--red)', interrupted: 'var(--yellow)',
  pending: 'var(--dim)',
}
const TYPE_SHORT = {
  explore:'exp', plan:'pln', implement:'imp',
  review:'rev', verify:'vfy', merge:'mrg',
}

function renderDag() {
  const body = document.getElementById('dag-body')
  const tasks = [...state.tasks].sort((a, b) => a.createdAt - b.createdAt)
  document.getElementById('dag-count').textContent =
    `${tasks.filter(t => t.status === 'done').length}/${tasks.length}`

  // Group by phase (rough: use dependsOn depth)
  body.innerHTML = ''
  for (const task of tasks) {
    const row = document.createElement('div')
    row.className = `task-row ${task.status}`
    if (task.id === state.selectedTaskId) row.classList.add('selected')
    row.onclick = () => selectTask(task.id)

    const icon = document.createElement('span')
    icon.className = 'task-icon'
    icon.textContent = STATUS_ICON[task.status] ?? '·'
    icon.style.color = STATUS_COLOR[task.status] ?? 'var(--dim)'

    const tag = document.createElement('span')
    tag.className = 'task-type-tag'
    tag.textContent = TYPE_SHORT[task.type] ?? task.type.slice(0, 3)

    const title = document.createElement('span')
    title.className = 'task-title'
    title.textContent = task.title

    row.appendChild(icon)
    row.appendChild(tag)
    row.appendChild(title)

    if (task.status === 'running' && task.startedAt) {
      const el = document.createElement('span')
      el.className = 'task-elapsed'
      el.textContent = fmtElapsed(Date.now() - task.startedAt)
      row.appendChild(el)
    }

    body.appendChild(row)
  }
}

// ── Render: Agents ────────────────────────────────────────────────────────────

const MODEL_SHORT = {
  'deepseek-v4-pro':   'dv4p', 'deepseek-v4-flash':  'dv4f',
  'deepseek-v3':       'dv3',  'deepseek-reasoner':  'r1',
  'claude-opus-4-7':   'opus', 'claude-sonnet-4-6':  'son',
  'gpt-4.1':           'g41',  'gpt-4.1-mini':       'g4m',
  'gpt-4o':            '4o',   'gemini-2.5-pro':     'g25p',
}
function shortModel(m) {
  if (!m) return ''
  return MODEL_SHORT[m] ?? m.split(/[-/]/).slice(-1)[0].slice(0, 5)
}

function renderAgents() {
  const body  = document.getElementById('agent-body')
  const agents = state.agents ?? []
  const idle   = (state.status?.agents?.idle ?? 0)
  document.getElementById('agent-count').textContent =
    `${agents.length} busy${idle > 0 ? ` · ${idle} idle` : ''}`

  body.innerHTML = ''

  for (const slot of agents) {
    const card = document.createElement('div')
    card.className = 'agent-card' + (state.expandedAgentId === slot.agentId ? ' expanded' : '')
    card.dataset.agentId = slot.agentId
    card.onclick = () => toggleAgentExpand(slot.agentId)

    const dur = fmtElapsed(Date.now() - slot.startedAt)
    const mShort = shortModel(slot.model)
    const scopeStr = slot.scope.map(s => s.split('/').slice(-2).join('/')).join(', ')

    card.innerHTML = `
      <div class="agent-card-header">
        <span class="agent-dot">●</span>
        <span class="agent-type-tag">${TYPE_SHORT[slot.type] ?? slot.type.slice(0,3)}</span>
        <span class="agent-title">${esc(slot.title)}</span>
        ${mShort ? `<span class="agent-model">${mShort}</span>` : ''}
        <span class="agent-elapsed">${dur}</span>
      </div>
      ${scopeStr ? `<div class="agent-meta"><span class="agent-scope">${esc(scopeStr)}</span></div>` : ''}
      ${slot.lastLine ? `<div class="agent-lastline">${esc(slot.lastLine)}</div>` : ''}
      <div class="agent-stream">${esc(state.agentStreams[slot.agentId] ?? '')}</div>
      <div class="agent-interrupt-btn">
        <button class="btn btn-danger" style="font-size:11px;padding:2px 8px"
          onclick="event.stopPropagation(); interruptAgent('${slot.agentId}')">✗ Interrupt</button>
      </div>
    `

    if (state.expandedAgentId === slot.agentId) {
      const streamEl = card.querySelector('.agent-stream')
      if (streamEl) streamEl.scrollTop = streamEl.scrollHeight
    }

    body.appendChild(card)
  }

  if (idle > 0) {
    const idleEl = document.createElement('div')
    idleEl.className = 'idle-agents'
    idleEl.textContent = `◌ ${idle} agent${idle > 1 ? 's' : ''} idle`
    body.appendChild(idleEl)
  }
}

// ── Render: Log ───────────────────────────────────────────────────────────────

function renderLog() {
  const body = document.getElementById('log-body')
  body.innerHTML = ''
  for (const line of state.log) {
    appendLogLine(line)
  }
  body.scrollTop = body.scrollHeight
}

function appendLogLine(line) {
  const el = document.createElement('div')
  el.className = 'log-line'
  if (line.startsWith('✓'))  el.classList.add('done')
  if (line.startsWith('✗'))  el.classList.add('fail')
  if (line.startsWith('⟳'))  el.classList.add('running')
  if (line.startsWith('⊕'))  el.classList.add('dynamic')
  if (line.startsWith('⏸'))  el.classList.add('paused')
  el.textContent = line
  return el
}

function pushLog(line) {
  state.log.push(line)
  if (state.log.length > 500) state.log.shift()
  const body = document.getElementById('log-body')
  const el = appendLogLine(line)
  body.appendChild(el)
  // Auto-scroll if near bottom
  if (body.scrollTop + body.clientHeight > body.scrollHeight - 40) {
    body.scrollTop = body.scrollHeight
  }
}

function pushLogStyled(line) {
  pushLog(line)
}

function clearLog() {
  state.log = []
  document.getElementById('log-body').innerHTML = ''
}

// ── Render: All ───────────────────────────────────────────────────────────────

function renderAll() {
  renderHeader()
  renderDag()
  renderAgents()
  renderLog()
}

// ── Task Detail ───────────────────────────────────────────────────────────────

function selectTask(id) {
  const panel = document.getElementById('detail-panel')
  if (state.selectedTaskId === id) {
    state.selectedTaskId = null
    panel.classList.remove('open')
    renderDag()
    return
  }
  state.selectedTaskId = id
  renderDag()
  const task = state.tasks.find(t => t.id === id)
  if (!task) return

  const inner = document.getElementById('detail-inner')
  const out = task.output
  inner.innerHTML = `
    <div class="detail-meta">
      <span>ID: <strong>${task.id.slice(0,12)}…</strong></span>
      <span>Type: <strong>${task.type}</strong></span>
      <span>Role: <strong>${task.role}</strong></span>
      <span>Status: <strong style="color:${STATUS_COLOR[task.status]}">${task.status}</strong></span>
      <span>Priority: <strong>${task.priority}</strong></span>
      ${task.startedAt && task.completedAt ? `<span>Duration: <strong>${fmtElapsed(task.completedAt - task.startedAt)}</strong></span>` : ''}
      ${task.tokenUsage ? `<span>Tokens: <strong>in:${fmtNum(task.tokenUsage.inputTokens)} out:${fmtNum(task.tokenUsage.outputTokens)}</strong></span>` : ''}
    </div>
    ${task.scope.length > 0 ? `<div class="detail-meta"><span>Scope: <strong>${task.scope.join(', ')}</strong></span></div>` : ''}
    ${out ? `
    <div class="detail-sections">
      <div class="detail-section"><h4>Summary</h4><pre>${esc(out.summary || 'none')}</pre></div>
      <div class="detail-section"><h4>Changes</h4><pre>${esc(out.changes.map(c => `- ${c.file}: ${c.description}`).join('\n') || 'none')}</pre></div>
      <div class="detail-section"><h4>Risks</h4><pre>${esc(out.risks.join('\n') || 'none')}</pre></div>
      <div class="detail-section"><h4>Blockers</h4><pre>${esc(out.blockers.join('\n') || 'none')}</pre></div>
      <div class="detail-section"><h4>Evidence</h4><pre>${esc(out.evidence.join('\n') || 'none')}</pre></div>
    </div>` : `<div style="color:var(--dim);font-size:12px">No output yet</div>`}
    ${task.error ? `<div style="color:var(--red);font-size:12px;margin-top:8px">Error: ${esc(task.error)}</div>` : ''}
  `
  panel.classList.add('open')
}

// ── Agent expand ──────────────────────────────────────────────────────────────

function toggleAgentExpand(agentId) {
  state.expandedAgentId = state.expandedAgentId === agentId ? null : agentId
  renderAgents()
}

function interruptAgent(agentId) {
  send({ type: 'interrupt', agentId })
}

// ── Pause / resume ────────────────────────────────────────────────────────────

function togglePause() {
  if (state.paused) {
    send({ type: 'resume' })
    state.paused = false
  } else {
    send({ type: 'pause' })
    state.paused = true
  }
  updatePauseBtn()
}

function updatePauseBtn() {
  const btn = document.getElementById('pause-btn')
  if (state.paused) {
    btn.className = 'btn btn-resume'
    btn.textContent = '▶ Resume'
  } else {
    btn.className = 'btn btn-pause'
    btn.textContent = '⏸ Pause'
  }
}

// ── Inject task ───────────────────────────────────────────────────────────────

function openInjectModal() {
  document.getElementById('inject-overlay').classList.add('open')
  document.getElementById('inject-prompt').focus()
}

function closeInjectModal() {
  document.getElementById('inject-overlay').classList.remove('open')
  document.getElementById('inject-prompt').value = ''
}

function submitInject() {
  const prompt = document.getElementById('inject-prompt').value.trim()
  if (!prompt) return
  send({ type: 'inject', prompt })
  closeInjectModal()
}

document.getElementById('inject-overlay').addEventListener('click', e => {
  if (e.target.id === 'inject-overlay') closeInjectModal()
})

// ── Approval modal ────────────────────────────────────────────────────────────

function showApprovalModal() {
  if (state.pendingApprovals.length === 0) return
  const req = state.pendingApprovals[0]
  document.getElementById('approval-msg').textContent = req.message ?? JSON.stringify(req, null, 2)
  document.getElementById('approval-overlay').classList.add('open')
}

function resolveApproval(decision) {
  if (state.pendingApprovals.length === 0) return
  const req = state.pendingApprovals.shift()
  send({ type: 'approve', requestId: req.id, decision })
  document.getElementById('approval-overlay').classList.remove('open')
  if (state.pendingApprovals.length > 0) showApprovalModal()
}

// ── Ticker (elapsed timers in DAG) ────────────────────────────────────────────

setInterval(() => {
  // Update elapsed times in running tasks without full re-render
  document.querySelectorAll('.task-row.running .task-elapsed').forEach((el, i) => {
    const tasks = state.tasks.filter(t => t.status === 'running' && t.startedAt)
    if (tasks[i]) el.textContent = fmtElapsed(Date.now() - tasks[i].startedAt)
  })
  // Update agent card elapsed
  document.querySelectorAll('.agent-card .agent-elapsed').forEach((el, i) => {
    if (state.agents[i]) el.textContent = fmtElapsed(Date.now() - state.agents[i].startedAt)
  })
}, 1000)

// ── Utils ─────────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function fmtElapsed(ms) {
  if (ms < 60000) return `${Math.round(ms / 1000)}s`
  return `${Math.floor(ms / 60000)}m${Math.round((ms % 60000) / 1000)}s`
}

function fmtEta(ms) {
  if (ms < 60000) return `~${Math.round(ms / 1000)}s`
  return `~${Math.ceil(ms / 60000)}m`
}

function fmtNum(n) {
  return Number(n).toLocaleString()
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeInjectModal()
    document.getElementById('approval-overlay').classList.remove('open')
    if (state.selectedTaskId) {
      state.selectedTaskId = null
      document.getElementById('detail-panel').classList.remove('open')
      renderDag()
    }
  }
  if (e.key === 'p' && !['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) {
    togglePause()
  }
})

// ── Boot ──────────────────────────────────────────────────────────────────────

connect()
</script>
</body>
</html>
